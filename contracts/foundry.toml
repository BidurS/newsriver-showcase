[profile.default]
src = "src"
out = "out"
libs = ["lib"]
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
]

[rpc_endpoints]
base = "${BASE_RPC_URL}"

# Etherscan / BaseScan API for verification
[etherscan]
base = { key = "${BASESCAN_API_KEY}", chain = "base", url = "https://api.basescan.org/api" }
